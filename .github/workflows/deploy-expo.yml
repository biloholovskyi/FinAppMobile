name: Expo Publish Update

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  publish:
    name: Install and Publish to Expo
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔍 TypeScript check
        run: yarn tsc --noEmit

      - name: 🚀 Publish to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: eas update --branch production --message "${{ github.event.head_commit.message }} (${{ github.sha }})"

      - name: 🔍 Publish preview for PR
        if: github.event_name == 'pull_request'
        run: eas update --branch pr-${{ github.event.pull_request.number }} --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
