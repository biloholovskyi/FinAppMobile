<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinApp — Редактировать транзакцию</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-void:    #050508;
      --bg-base:    #0A0A12;
      --bg-surface: #10101C;
      --bg-elevated:#181828;
      --bg-overlay: #1E1E35;

      --border-subtle:  rgba(255,255,255,0.04);
      --border-default: rgba(255,255,255,0.08);
      --border-strong:  rgba(255,255,255,0.16);

      --accent-blue:        #4F9EFF;
      --accent-blue-glow:   rgba(79,158,255,0.25);
      --accent-green:       #00E089;
      --accent-green-glow:  rgba(0,224,137,0.2);
      --accent-red:         #FF4B6B;
      --accent-red-glow:    rgba(255,75,107,0.2);
      --accent-amber:       #FFB020;
      --accent-purple:      #A374FF;

      --text-primary:   #F2F2FF;
      --text-secondary: #8888AA;
      --text-muted:     #44445A;
      --text-inverse:   #080810;

      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --glow-blue:   0 0 20px rgba(79,158,255,0.3), 0 0 60px rgba(79,158,255,0.1);
      --glow-green:  0 0 20px rgba(0,224,137,0.3);
      --glow-red:    0 0 20px rgba(255,75,107,0.3);

      --radius-sm:   8px;
      --radius-md:   16px;
      --radius-lg:   24px;
      --radius-full: 9999px;

      --ease-out:    cubic-bezier(0.4,0,0.2,1);
      --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
      --t-fast: 150ms;
      --t-base: 280ms;
      --t-slow: 500ms;
    }

    body {
      background: radial-gradient(ellipse at top, #0A0612 0%, #02020A 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      font-family: 'Inter', sans-serif;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .phone {
      width: 375px;
      height: 812px;
      background: var(--bg-base);
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px var(--border-default),
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 0;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .status-time {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      color: var(--text-primary);
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
    }
    .screen::-webkit-scrollbar { display: none; }

    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding-bottom: 16px;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    .home-indicator {
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: var(--radius-full);
      margin: 8px auto;
      opacity: 0.3;
      flex-shrink: 0;
    }

    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
      animation: fadeUp var(--t-slow) var(--ease-out) both;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--accent-blue);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 0;
      transition: opacity var(--t-fast) var(--ease-out);
    }
    .btn-back:hover { opacity: 0.7; }

    .nav-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .nav-right {
      width: 60px;
    }

    .segment-wrap {
      padding: 0 20px 16px;
      flex-shrink: 0;
      animation: fadeUp var(--t-slow) var(--ease-out) both;
      animation-delay: 60ms;
    }

    .segment {
      display: flex;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 4px;
      gap: 2px;
    }

    .seg-btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--t-base) var(--ease-out);
    }
    .seg-btn.active-expense {
      background: var(--accent-red-glow);
      color: var(--accent-red);
      box-shadow: 0 1px 8px rgba(255,75,107,0.2);
    }
    .seg-btn.active-income {
      background: var(--accent-green-glow);
      color: var(--accent-green);
      box-shadow: 0 1px 8px rgba(0,224,137,0.15);
    }
    .seg-btn.active-transfer {
      background: var(--accent-blue-glow);
      color: var(--accent-blue);
      box-shadow: 0 1px 8px rgba(79,158,255,0.2);
    }

    .amount-section {
      padding: 8px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeUp var(--t-slow) var(--ease-out) both;
      animation-delay: 120ms;
    }

    .amount-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .amount-input-wrap {
      display: flex;
      align-items: baseline;
      gap: 4px;
      width: 100%;
      justify-content: center;
      border-bottom: 2px solid var(--border-default);
      padding-bottom: 10px;
      transition: border-color var(--t-fast) var(--ease-out);
    }
    .amount-input-wrap:focus-within {
      border-color: var(--accent-red);
    }
    .amount-input-wrap.income-mode:focus-within {
      border-color: var(--accent-green);
    }
    .amount-input-wrap.transfer-mode:focus-within {
      border-color: var(--accent-blue);
    }

    .amount-value {
      font-family: 'DM Mono', monospace;
      font-size: 42px;
      font-weight: 700;
      color: var(--text-primary);
      background: none;
      border: none;
      outline: none;
      text-align: center;
      width: auto;
      min-width: 40px;
      max-width: 220px;
      letter-spacing: -2px;
      caret-color: var(--accent-red);
    }

    .amount-currency {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: -0.5px;
    }

    .form-card {
      margin: 0 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: fadeUp var(--t-slow) var(--ease-out) both;
      animation-delay: 180ms;
    }

    .form-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background var(--t-fast) var(--ease-out);
      gap: 12px;
    }
    .form-row:last-child { border-bottom: none; }
    .form-row:hover { background: rgba(255,255,255,0.02); }

    .form-row-icon {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .form-row-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .form-row-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    .form-row-value {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-row-value.placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    .form-row-value input {
      background: none;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      width: 100%;
    }
    .form-row-value input::placeholder { color: var(--text-muted); }

    .form-row-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      background: rgba(0,224,137,0.15);
      color: var(--accent-green);
    }

    .chevron {
      color: var(--text-muted);
    }

    .buttons-wrap {
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp var(--t-slow) var(--ease-out) both;
      animation-delay: 240ms;
    }

    .btn-save {
      width: 100%;
      padding: 15px 24px;
      background: var(--accent-blue);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-inverse);
      cursor: pointer;
      transition: transform var(--t-fast) var(--ease-spring),
                  box-shadow var(--t-base) var(--ease-out);
      box-shadow: 0 4px 16px rgba(79,158,255,0.3);
    }
    .btn-save:hover {
      transform: scale(1.02);
      box-shadow: var(--glow-blue);
    }
    .btn-save:active { transform: scale(0.98); }

    .btn-delete {
      width: 100%;
      padding: 12px 24px;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent-red);
      cursor: pointer;
      transition: opacity var(--t-fast) var(--ease-out);
      text-align: center;
    }
    .btn-delete:hover { opacity: 0.7; }

    .row-hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <i data-lucide="signal" width="14" height="14"></i>
        <i data-lucide="wifi" width="14" height="14"></i>
        <i data-lucide="battery" width="14" height="14"></i>
      </div>
    </div>

    <div class="screen">
      <div class="nav-bar">
        <button class="btn-back">
          <i data-lucide="chevron-left" width="18" height="18"></i>
          Назад
        </button>
        <span class="nav-title">Редактировать</span>
        <div class="nav-right"></div>
      </div>

      <div class="screen-content">

        <div class="segment-wrap">
          <div class="segment">
            <button class="seg-btn active-expense" data-type="expense">Расход</button>
            <button class="seg-btn" data-type="income">Доход</button>
            <button class="seg-btn" data-type="transfer">Перевод</button>
          </div>
        </div>

        <div class="amount-section">
          <span class="amount-label">Сумма</span>
          <div class="amount-input-wrap" id="amountWrap">
            <input class="amount-value" id="amountInput" type="text" value="320" inputmode="decimal" maxlength="10">
            <span class="amount-currency">₽</span>
          </div>
        </div>

        <div class="form-card">
          <div class="form-row" id="rowWallet">
            <div class="form-row-icon">
              <i data-lucide="building-2" width="14" height="14"></i>
            </div>
            <div class="form-row-content">
              <span class="form-row-label">Кошелёк</span>
              <span class="form-row-value">Monobank</span>
            </div>
            <div class="form-row-right">
              <i data-lucide="chevron-right" width="16" height="16" class="chevron"></i>
            </div>
          </div>

          <div class="form-row" id="rowWalletTo">
            <div class="form-row-icon">
              <i data-lucide="wallet" width="14" height="14"></i>
            </div>
            <div class="form-row-content">
              <span class="form-row-label">Кошелёк-получатель</span>
              <span class="form-row-value">Наличные</span>
            </div>
            <div class="form-row-right">
              <i data-lucide="chevron-right" width="16" height="16" class="chevron"></i>
            </div>
          </div>

          <div class="form-row" id="rowCategory">
            <div class="form-row-icon">
              <i data-lucide="tag" width="14" height="14"></i>
            </div>
            <div class="form-row-content">
              <span class="form-row-label">Категория</span>
            </div>
            <div class="form-row-right">
              <span class="cat-badge">Еда</span>
              <i data-lucide="chevron-right" width="16" height="16" class="chevron"></i>
            </div>
          </div>

          <div class="form-row" id="rowDesc">
            <div class="form-row-icon">
              <i data-lucide="pencil-line" width="14" height="14"></i>
            </div>
            <div class="form-row-content">
              <span class="form-row-label">Описание</span>
              <div class="form-row-value">
                <input type="text" placeholder="Добавить описание..." value="Обед в кафе">
              </div>
            </div>
          </div>

          <div class="form-row" id="rowDate">
            <div class="form-row-icon">
              <i data-lucide="calendar" width="14" height="14"></i>
            </div>
            <div class="form-row-content">
              <span class="form-row-label">Дата и время</span>
              <span class="form-row-value">Сегодня, 13:45</span>
            </div>
            <div class="form-row-right">
              <i data-lucide="chevron-right" width="16" height="16" class="chevron"></i>
            </div>
          </div>
        </div>

        <div class="buttons-wrap">
          <button class="btn-save" id="btnSave">Сохранить</button>
          <button class="btn-delete">Удалить транзакцию</button>
        </div>

      </div>
    </div>

    <div class="home-indicator"></div>
  </div>

  <script>
    lucide.createIcons();

    const segBtns = document.querySelectorAll('.seg-btn');
    const rowCategory = document.getElementById('rowCategory');
    const rowWalletTo = document.getElementById('rowWalletTo');
    const amountWrap = document.getElementById('amountWrap');
    const amountInput = document.getElementById('amountInput');
    const btnSave = document.getElementById('btnSave');

    let currentType = 'expense';

    const activeClassMap = {
      expense: 'active-expense',
      income: 'active-income',
      transfer: 'active-transfer',
    };

    const saveBgMap = {
      expense: 'var(--accent-red)',
      income: 'var(--accent-green)',
      transfer: 'var(--accent-blue)',
    };

    const saveShadowMap = {
      expense: '0 4px 16px rgba(255,75,107,0.3)',
      income: '0 4px 16px rgba(0,224,137,0.25)',
      transfer: '0 4px 16px rgba(79,158,255,0.3)',
    };

    const saveColorMap = {
      expense: 'var(--text-inverse)',
      income: 'var(--text-inverse)',
      transfer: 'var(--text-inverse)',
    };

    const caretMap = {
      expense: 'var(--accent-red)',
      income: 'var(--accent-green)',
      transfer: 'var(--accent-blue)',
    };

    function setType(type) {
      currentType = type;

      segBtns.forEach(btn => {
        btn.classList.remove('active-expense', 'active-income', 'active-transfer');
        if (btn.dataset.type === type) {
          btn.classList.add(activeClassMap[type]);
        }
      });

      amountWrap.classList.remove('income-mode', 'transfer-mode');
      if (type === 'income') amountWrap.classList.add('income-mode');
      if (type === 'transfer') amountWrap.classList.add('transfer-mode');

      amountInput.style.caretColor = caretMap[type];

      if (type === 'transfer') {
        rowCategory.classList.add('row-hidden');
        rowWalletTo.classList.remove('row-hidden');
      } else {
        rowCategory.classList.remove('row-hidden');
        rowWalletTo.classList.add('row-hidden');
      }

      btnSave.style.background = saveBgMap[type];
      btnSave.style.boxShadow = saveShadowMap[type];
      btnSave.style.color = saveColorMap[type];
    }

    segBtns.forEach(btn => {
      btn.addEventListener('click', () => setType(btn.dataset.type));
    });

    rowWalletTo.classList.add('row-hidden');

    setType('expense');
  </script>
</body>
</html>
