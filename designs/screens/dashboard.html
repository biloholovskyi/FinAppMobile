<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinApp — Дашборд</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-void:    #050508;
      --bg-base:    #0A0A12;
      --bg-surface: #10101C;
      --bg-elevated:#181828;
      --bg-overlay: #1E1E35;

      --border-subtle:  rgba(255,255,255,0.04);
      --border-default: rgba(255,255,255,0.08);
      --border-strong:  rgba(255,255,255,0.16);

      --accent-blue:        #4F9EFF;
      --accent-blue-glow:   rgba(79,158,255,0.25);
      --accent-green:       #00E089;
      --accent-green-glow:  rgba(0,224,137,0.2);
      --accent-red:         #FF4B6B;
      --accent-red-glow:    rgba(255,75,107,0.2);
      --accent-amber:       #FFB020;
      --accent-purple:      #A374FF;

      --text-primary:   #F2F2FF;
      --text-secondary: #8888AA;
      --text-muted:     #44445A;
      --text-inverse:   #080810;

      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --glow-blue:   0 0 20px rgba(79,158,255,0.3), 0 0 60px rgba(79,158,255,0.1);
      --glow-green:  0 0 20px rgba(0,224,137,0.3);
      --glow-red:    0 0 20px rgba(255,75,107,0.3);

      --radius-sm:   8px;
      --radius-md:   16px;
      --radius-lg:   24px;
      --radius-full: 9999px;

      --ease-out:    cubic-bezier(0.4,0,0.2,1);
      --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
      --t-fast: 150ms;
      --t-base: 280ms;
      --t-slow: 500ms;
    }

    body {
      background: radial-gradient(ellipse at top, #0A0612 0%, #02020A 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      font-family: 'Inter', sans-serif;
    }

    /* ── Phone frame ─────────────────────────────────── */
    .phone {
      width: 375px;
      height: 812px;
      background: var(--bg-base);
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px var(--border-default),
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 0;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .status-time {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      color: var(--text-primary);
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
    }
    .screen::-webkit-scrollbar { display: none; }

    /* scrollable content area */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding-bottom: 8px;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    .home-indicator {
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: var(--radius-full);
      margin: 8px auto;
      opacity: 0.3;
      flex-shrink: 0;
    }

    /* ── Screen header ───────────────────────────────── */
    .screen-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .screen-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .header-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
    }

    /* ── Cards ───────────────────────────────────────── */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 0 12px 10px;
      box-shadow: var(--shadow-card);
      animation: fadeUp var(--t-slow) var(--ease-out) both;
      transition: transform var(--t-base) var(--ease-out),
                  box-shadow var(--t-base) var(--ease-out);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card), var(--glow-blue);
    }
    .card:nth-child(1) { animation-delay: 0ms; }
    .card:nth-child(2) { animation-delay: 120ms; }

    /* ── Block 1 ─────────────────────────────────────── */
    .card-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .diff-amount {
      font-family: 'DM Mono', monospace;
      font-weight: 700;
      font-size: 30px;
      color: var(--accent-red);
      text-align: center;
      display: block;
      letter-spacing: -1px;
      margin-bottom: 6px;
      text-shadow: var(--glow-red);
    }

    .trend-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .trend-text {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent-red);
    }

    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin-bottom: 12px;
    }

    .month-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .month-label {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
    }
    .month-label.current { color: var(--text-primary); }
    .month-label.previous { color: var(--text-secondary); }

    .month-amount {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
    }
    .month-amount.current { color: var(--text-primary); }
    .month-amount.previous { color: var(--text-secondary); }

    /* ── Block 2 ─────────────────────────────────────── */
    .chart-wrap {
      height: 180px;
      position: relative;
      margin-top: 10px;
    }

    /* ── Tab bar ─────────────────────────────────────── */
    .tab-bar {
      display: flex;
      justify-content: space-around;
      padding: 12px 0 4px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color var(--t-fast) var(--ease-out);
      padding: 2px 12px;
      border-radius: var(--radius-sm);
    }
    .tab-item.active { color: var(--accent-blue); }
    .tab-item:hover:not(.active) { color: var(--text-secondary); }

    .tab-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* active tab blue dot indicator */
    .tab-item.active .tab-icon {
      position: relative;
    }

    /* ── Animations ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .trend-icon-wrap {
      display: flex;
      align-items: center;
      color: var(--accent-red);
    }

    /* header animation */
    .screen-header {
      animation: fadeUp var(--t-slow) var(--ease-out) both;
      animation-delay: 0ms;
    }
    /* ── Wallets section ─────────────────────────────── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spinning { animation: spin 1s linear infinite; }

    .wallets-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .total-balance {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .wallet-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .wallet-row:last-child { border-bottom: none; }

    .wallet-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .wallet-name-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .wallet-name {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .integration-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: var(--radius-full);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 600;
      color: var(--accent-green);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      width: fit-content;
    }

    .wallet-balance-col {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
      margin-right: 8px;
    }
    .balance-pos { color: var(--accent-green); }
    .balance-neg { color: var(--accent-red); }
    .balance-zero { color: var(--text-secondary); }

    .btn-refresh {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color var(--t-fast) var(--ease-out),
                  color var(--t-fast) var(--ease-out);
    }
    .btn-refresh:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }
    .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="phone">
    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <i data-lucide="signal" width="14" height="14"></i>
        <i data-lucide="wifi" width="14" height="14"></i>
        <i data-lucide="battery" width="14" height="14"></i>
      </div>
    </div>

    <!-- Screen -->
    <div class="screen">
      <!-- Header -->
      <div class="screen-header">
        <span class="screen-title">Дашборд</span>
        <div class="header-avatar">DB</div>
      </div>

      <!-- Scrollable content -->
      <div class="screen-content">

        <!-- ── Block 1: Витрати порівняння ─────────────── -->
        <div class="card">
          <div class="card-label">ВИТРАТИ · КВІТЕНЬ vs БЕРЕЗЕНЬ (1–6)</div>

          <span class="diff-amount">−₴3 240,00</span>

          <div class="trend-row">
            <span class="trend-icon-wrap">
              <i data-lucide="trending-up" width="14" height="14"></i>
            </span>
            <span class="trend-text">↑ 12.4% більше</span>
          </div>

          <div class="divider"></div>

          <div class="month-row">
            <span class="month-label current">Квітень</span>
            <span class="month-amount current">₴28 640,00</span>
          </div>
          <div class="month-row">
            <span class="month-label previous">Березень</span>
            <span class="month-amount previous">₴25 400,00</span>
          </div>
        </div>

        <!-- ── Block 2: Динаміка витрат ───────────────── -->
        <div class="card">
          <div class="card-label">ДИНАМІКА ВИТРАТ</div>
          <div class="chart-wrap">
            <canvas id="expenseChart"></canvas>
          </div>
        </div>

        <!-- ── Block 3: Кошельки ──────────────────────── -->
        <div class="card" style="animation-delay: 240ms;">
          <div class="wallets-header">
            <div class="card-label" style="margin-bottom: 0;">КОШЕЛЬКИ</div>
            <span class="total-balance">₴56 170,50</span>
          </div>

          <!-- Наличные -->
          <div class="wallet-row">
            <div class="wallet-icon">
              <i data-lucide="wallet" width="14" height="14"></i>
            </div>
            <div class="wallet-name-wrap">
              <span class="wallet-name">Наличные</span>
            </div>
            <span class="wallet-balance-col balance-pos">₴12 450,00</span>
          </div>

          <!-- Monobank (обновляется — spinning) -->
          <div class="wallet-row">
            <div class="wallet-icon">
              <i data-lucide="credit-card" width="14" height="14"></i>
            </div>
            <div class="wallet-name-wrap">
              <span class="wallet-name">Monobank</span>
              <span class="integration-badge">monobank</span>
            </div>
            <span class="wallet-balance-col balance-pos">₴45 820,50</span>
            <button class="btn-refresh" disabled title="Обновить">
              <i data-lucide="refresh-cw" width="13" height="13" class="spinning"></i>
            </button>
          </div>

          <!-- Карта ПриватБанк -->
          <div class="wallet-row">
            <div class="wallet-icon">
              <i data-lucide="credit-card" width="14" height="14"></i>
            </div>
            <div class="wallet-name-wrap">
              <span class="wallet-name">Карта ПриватБанк</span>
            </div>
            <span class="wallet-balance-col balance-neg">−₴2 100,00</span>
            <button class="btn-refresh" title="Обновить">
              <i data-lucide="refresh-cw" width="13" height="13"></i>
            </button>
          </div>
        </div>

      </div><!-- /screen-content -->

      <!-- Tab bar -->
      <div class="tab-bar">
        <div class="tab-item active">
          <div class="tab-icon"><i data-lucide="home" width="20" height="20"></i></div>
          <span>Головна</span>
        </div>
        <div class="tab-item">
          <div class="tab-icon"><i data-lucide="wallet" width="20" height="20"></i></div>
          <span>Гаманці</span>
        </div>
        <div class="tab-item">
          <div class="tab-icon"><i data-lucide="list" width="20" height="20"></i></div>
          <span>Операції</span>
        </div>
        <div class="tab-item">
          <div class="tab-icon"><i data-lucide="settings" width="20" height="20"></i></div>
          <span>Налашт.</span>
        </div>
      </div>

    </div><!-- /screen -->

    <div class="home-indicator"></div>
  </div><!-- /phone -->

  <script>
    // ── Lucide icons ───────────────────────────────────
    lucide.createIcons();

    // ── Chart.js global defaults ───────────────────────
    Chart.defaults.color = '#8888AA';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
    Chart.defaults.font.family = "'DM Mono', monospace";
    Chart.defaults.animation.duration = 1000;
    Chart.defaults.animation.easing = 'easeInOutQuart';

    // ── Dark chart base config ─────────────────────────
    const darkChart = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#8888AA',
            font: { family: 'Inter', size: 11 },
            boxWidth: 10,
            padding: 12,
            usePointStyle: true,
            pointStyleWidth: 10,
          }
        },
        tooltip: {
          backgroundColor: '#181828',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          titleColor: '#F2F2FF',
          bodyColor: '#8888AA',
          padding: 12,
          cornerRadius: 8,
          titleFont: { family: 'Inter', size: 13, weight: '600' },
          bodyFont:  { family: 'DM Mono', size: 12 },
          callbacks: {
            label: (ctx) => {
              const val = ctx.parsed.y;
              if (val === null) return null;
              return ` ₴${val.toLocaleString('uk-UA')}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid:  { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#8888AA', font: { family: 'Inter', size: 9 }, maxTicksLimit: 7 },
          border: { display: false },
        },
        y: {
          grid:  { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: {
            color: '#8888AA',
            font: { family: 'DM Mono', size: 9 },
            callback: (v) => v >= 1000 ? (v/1000) + 'к' : v,
          },
          border: { display: false },
          min: 0,
          max: 32000,
        }
      }
    };

    // ── Data ───────────────────────────────────────────
    const days = Array.from({length: 31}, (_, i) => i + 1);

    // April actual (days 1–6, rest null)
    const aprilActual = [
      2100, 5800, 8400, 12300, 18700, 28640,
      null, null, null, null, null, null, null, null, null,
      null, null, null, null, null, null, null, null, null,
      null, null, null, null, null, null, null
    ];

    // April projected (days 6–30 flat at 28640, rest null)
    const aprilProjected = [
      null, null, null, null, null,
      28640, 28640, 28640, 28640, 28640, 28640, 28640, 28640, 28640, 28640,
      28640, 28640, 28640, 28640, 28640, 28640, 28640, 28640, 28640, 28640,
      28640, 28640, 28640, 28640, 28640, null
    ];

    // March actual (all 31 days)
    const marchActual = [
      1800, 4200, 7100, 10500, 13800, 17200, 19500, 21000, 22800, 23900,
      24200, 24600, 25000, 25100, 25100, 25200, 25300, 25300, 25310, 25320,
      25350, 25360, 25370, 25380, 25390, 25395, 25398, 25399, 25400, 25400, 25400
    ];

    // March projected (flat — complete month, just endpoint)
    const marchProjected = Array(31).fill(null);
    marchProjected[30] = 25400;

    // ── Custom plugin: vertical "сьогодні" line at day 6 ──
    const todayLinePlugin = {
      id: 'todayLine',
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;

        // day index 5 = day 6 (0-based)
        const todayIndex = 5;
        const xPos = x.getPixelForValue(todayIndex);
        const yTop = y.top;
        const yBottom = y.bottom;

        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#FFB020';
        ctx.lineWidth = 1.2;
        ctx.globalAlpha = 0.7;
        ctx.moveTo(xPos, yTop);
        ctx.lineTo(xPos, yBottom);
        ctx.stroke();

        // "сьогодні" label
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
        ctx.font = "500 9px 'Inter', sans-serif";
        ctx.fillStyle = '#FFB020';
        ctx.textAlign = 'center';
        ctx.fillText('сьогодні', xPos, yTop - 4);

        // orange dot at intersection with aprilActual (y=28640)
        const dotY = y.getPixelForValue(28640);
        ctx.beginPath();
        ctx.arc(xPos, dotY, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#FFB020';
        ctx.shadowColor = '#FFB020';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.restore();
      }
    };

    // ── Build chart ────────────────────────────────────
    const ctx = document.getElementById('expenseChart').getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: days,
        datasets: [
          {
            label: 'Квітень',
            data: aprilActual,
            borderColor: '#4F9EFF',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#4F9EFF',
            fill: false,
            tension: 0.3,
            spanGaps: false,
          },
          {
            label: 'Квітень (прогноз)',
            data: aprilProjected,
            borderColor: '#4F9EFF',
            borderWidth: 1.5,
            borderDash: [5, 4],
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            spanGaps: false,
          },
          {
            label: 'Березень',
            data: marchActual,
            borderColor: '#555570',
            borderWidth: 2,
            borderDash: [],
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#555570',
            fill: false,
            tension: 0.3,
            spanGaps: false,
          },
          {
            label: 'Березень (прогноз)',
            data: marchProjected,
            borderColor: '#3A3A55',
            borderWidth: 1.5,
            borderDash: [5, 4],
            pointRadius: 0,
            pointHoverRadius: 0,
            fill: false,
            tension: 0,
            spanGaps: false,
          },
        ]
      },
      options: {
        ...darkChart,
        plugins: {
          ...darkChart.plugins,
          legend: {
            ...darkChart.plugins.legend,
            labels: {
              ...darkChart.plugins.legend.labels,
              filter: (item) => !item.text.includes('прогноз'),
            }
          }
        },
        scales: {
          ...darkChart.scales,
          x: {
            ...darkChart.scales.x,
            ticks: {
              ...darkChart.scales.x.ticks,
              callback: (val, index) => {
                const shown = [0, 4, 9, 14, 19, 24, 29];
                return shown.includes(index) ? days[index] : '';
              }
            }
          }
        }
      },
      plugins: [todayLinePlugin],
    });
  </script>
</body>
</html>
